<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
<style>
/* Art direction: Enterprise CRM, ivory/cream base -> warm, calm, confident, awwwards-grade polish
   Palette: ivory/cream neutral surfaces + single teal accent; status hues used sparingly for badges/events only
   Typography: Switzer (display) + General Sans (body/UI)
   Density: dense dashboard grid, generous section rhythm, weekly calendar as centerpiece with live time indicator */

:root, [data-theme="light"]{
  --color-bg:#f7f8fa; --color-surface:#ffffff; --color-surface-2:#ffffff;
  --color-surface-offset:#f1f3f5; --color-surface-offset-2:#e9ebee; --color-surface-dynamic:#dfe2e6;
  --color-divider:#e5e7eb; --color-border:#d7dbe0;
  --color-text:#1f2328; --color-text-muted:#6b7280; --color-text-faint:#9ca3af; --color-text-inverse:#ffffff;
  --color-primary:#0d7a75; --color-primary-hover:#0a5d59; --color-primary-active:#084644; --color-primary-highlight:#dbeceb;
  --color-notification:#c0344c; --color-notification-highlight:#fbe2e6;
  --color-success:#3f8a3f; --color-success-highlight:#e3f1e2;
  --color-warning:#b9760f; --color-warning-highlight:#faecd6;
  --color-blue:#2870b8; --color-blue-highlight:#dfeaf7;
  --color-gold:#b8901a; --color-gold-highlight:#f6ecd2;
  --color-purple:#7350ad; --color-purple-highlight:#ece4f6;
  --radius-sm:.375rem; --radius-md:.5rem; --radius-lg:.75rem; --radius-xl:1rem; --radius-full:9999px;
  --transition-interactive:180ms cubic-bezier(.16,1,.3,1); --ease-out:cubic-bezier(.16,1,.3,1);
  --shadow-sm:0 1px 2px oklch(0.2 0 0/.06); --shadow-md:0 4px 14px oklch(0.2 0 0/.08); --shadow-lg:0 20px 48px oklch(0.2 0 0/.14);
  --font-body:'General Sans','Inter',sans-serif; --font-display:'Switzer','General Sans',sans-serif;
  --sidebar-w:252px; --sidebar-w-collapsed:76px; --topbar-h:64px;
}
[data-theme="dark"]{
  --color-bg:#171614; --color-surface:#1c1b19; --color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a; --color-surface-offset-2:#22211f; --color-surface-dynamic:#2d2c2a;
  --color-divider:#262523; --color-border:#393836;
  --color-text:#cdccca; --color-text-muted:#797876; --color-text-faint:#5a5957; --color-text-inverse:#2b2a28;
  --color-primary:#4f98a3; --color-primary-hover:#227f8b; --color-primary-active:#1a626b; --color-primary-highlight:#313b3b;
  --color-notification:#dd6974; --color-notification-highlight:#574848;
  --color-success:#6daa45; --color-success-highlight:#3a4435;
  --color-warning:#bb653b; --color-warning-highlight:#564942;
  --color-blue:#5591c7; --color-blue-highlight:#3a4550;
  --color-gold:#e8af34; --color-gold-highlight:#4d4332;
  --color-purple:#a86fdf; --color-purple-highlight:#4e4652;
  --shadow-sm:0 1px 2px oklch(0 0 0/.25); --shadow-md:0 4px 12px oklch(0 0 0/.35); --shadow-lg:0 16px 40px oklch(0 0 0/.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--color-bg);color:var(--color-text);font-size:14.5px;line-height:1.5;overflow:hidden}
img,svg{display:block}
button{font:inherit;color:inherit;cursor:pointer;background:none;border:none}
a{color:inherit;text-decoration:none}
input,select,textarea{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:2px;border-radius:var(--radius-sm)}
::selection{background:color-mix(in oklch,var(--color-primary) 25%,transparent)}
table{border-collapse:collapse;width:100%}
.tabular{font-variant-numeric:tabular-nums}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeUp 320ms var(--ease-out) both}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ===== SHELL ===== */
.app-shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--topbar-h) 1fr;grid-template-areas:"sidebar topbar" "sidebar main";height:100dvh;transition:grid-template-columns var(--transition-interactive)}
.app-shell.collapsed{grid-template-columns:var(--sidebar-w-collapsed) 1fr}

.sidebar{grid-area:sidebar;background:var(--color-surface);border-right:1px solid var(--color-divider);display:flex;flex-direction:column;overflow:hidden}
.sidebar-brand{height:var(--topbar-h);display:flex;align-items:center;gap:10px;padding:0 20px;border-bottom:1px solid var(--color-divider);flex-shrink:0;white-space:nowrap}
.sidebar-brand svg{flex-shrink:0;color:var(--color-primary)}
.sidebar-brand span{font-family:var(--font-display);font-weight:700;font-size:17px;letter-spacing:-.01em;opacity:1;transition:opacity 120ms}
.collapsed .sidebar-brand span{opacity:0;width:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:2px}
.nav-section-label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);padding:16px 12px 6px;white-space:nowrap}
.collapsed .nav-section-label{opacity:0;height:0;padding:4px 0 0;overflow:hidden}
.nav-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:var(--radius-md);color:var(--color-text-muted);font-size:13.5px;font-weight:500;white-space:nowrap;position:relative;transition:background var(--transition-interactive),color var(--transition-interactive)}
.nav-item svg{flex-shrink:0;width:18px;height:18px}
.nav-item span.label{overflow:hidden;text-overflow:ellipsis;opacity:1;transition:opacity 120ms}
.collapsed .nav-item span.label{opacity:0;width:0}
.nav-item:hover{background:var(--color-surface-offset);color:var(--color-text)}
.nav-item.active{background:var(--color-primary-highlight);color:var(--color-primary-active);font-weight:600}
.nav-item.active svg{color:var(--color-primary)}
.nav-item .nav-badge{margin-left:auto;background:var(--color-notification);color:#fff;font-size:10.5px;font-weight:600;padding:1px 6px;border-radius:var(--radius-full);line-height:1.4}
.collapsed .nav-item .nav-badge{display:none}
.sidebar-footer{border-top:1px solid var(--color-divider);padding:12px;flex-shrink:0}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--radius-md);transition:background var(--transition-interactive);cursor:pointer}
.user-chip:hover{background:var(--color-surface-offset)}
.user-avatar{width:32px;height:32px;border-radius:var(--radius-full);background:var(--color-primary);color:var(--color-text-inverse);display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:600;flex-shrink:0}
.user-meta{overflow:hidden;opacity:1;transition:opacity 120ms}
.collapsed .user-meta{opacity:0;width:0}
.user-meta .name{font-size:13px;font-weight:600;white-space:nowrap}
.user-meta .tenant{font-size:11.5px;color:var(--color-text-muted);white-space:nowrap}

.topbar{grid-area:topbar;background:var(--color-surface);border-bottom:1px solid var(--color-divider);display:flex;align-items:center;gap:16px;padding:0 20px}
.topbar-toggle{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);color:var(--color-text-muted);transition:background var(--transition-interactive);flex-shrink:0}
.topbar-toggle:hover{background:var(--color-surface-offset);color:var(--color-text)}
.topbar-search{flex:1;max-width:420px;display:flex;align-items:center;gap:8px;background:var(--color-surface-offset);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:0 12px;height:38px;color:var(--color-text-faint);transition:border-color var(--transition-interactive)}
.topbar-search:hover,.topbar-search:focus-within{border-color:var(--color-primary)}
.topbar-search svg{flex-shrink:0;width:16px;height:16px}
.topbar-search input{background:none;border:none;outline:none;font:inherit;color:var(--color-text);width:100%;font-size:13px}
.topbar-search kbd{font-size:10.5px;color:var(--color-text-faint);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:1px 5px;font-family:inherit}
.topbar-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);color:var(--color-text-muted);position:relative;transition:background var(--transition-interactive),color var(--transition-interactive)}
.icon-btn:hover{background:var(--color-surface-offset);color:var(--color-text)}
.icon-btn .dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:var(--radius-full);background:var(--color-notification);border:2px solid var(--color-surface)}
.btn-primary{display:flex;align-items:center;gap:6px;background:var(--color-primary);color:var(--color-text-inverse);padding:0 16px;height:36px;border-radius:var(--radius-md);font-size:13px;font-weight:600;white-space:nowrap;transition:background var(--transition-interactive),box-shadow var(--transition-interactive),transform var(--transition-interactive)}
.btn-primary:hover{background:var(--color-primary-hover);box-shadow:var(--shadow-sm)}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{display:flex;align-items:center;gap:6px;background:var(--color-surface-offset);border:1px solid var(--color-border);color:var(--color-text);padding:0 14px;height:34px;border-radius:var(--radius-md);font-size:13px;font-weight:600;transition:background var(--transition-interactive)}
.btn-secondary:hover{background:var(--color-surface-offset-2)}
.btn-ghost{display:flex;align-items:center;gap:6px;color:var(--color-text-muted);padding:0 10px;height:32px;border-radius:var(--radius-md);font-size:13px;font-weight:500;transition:background var(--transition-interactive),color var(--transition-interactive)}
.btn-ghost:hover{background:var(--color-surface-offset);color:var(--color-text)}

.main-content{grid-area:main;overflow-y:auto;padding:26px 30px 52px;position:relative}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-faint);margin-bottom:8px}
.breadcrumb .sep{opacity:.6}
.breadcrumb .current{color:var(--color-text-muted)}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.page-header h1{font-family:var(--font-display);font-size:23px;font-weight:700;letter-spacing:-.015em}
.page-header p{color:var(--color-text-muted);font-size:13px;margin-top:3px}
.header-actions{display:flex;align-items:center;gap:10px}
.panel{background:var(--color-surface);border:1px solid var(--color-divider);border-radius:var(--radius-lg);overflow:hidden}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--color-divider)}
.panel-head h3{font-size:13.5px;font-weight:600}
.panel-head .count-chip{font-size:11px;background:var(--color-surface-offset);color:var(--color-text-muted);padding:1px 7px;border-radius:var(--radius-full);margin-left:6px}
.panel-head .link{font-size:12px;color:var(--color-primary);font-weight:600;display:flex;align-items:center;gap:3px}

/* ===== DASHBOARD: TOP ROW ===== */
.top-row{display:grid;grid-template-columns:1.1fr 1.3fr 1.3fr;gap:16px;margin-bottom:18px}
.focus-card{padding:20px 16px;text-align:center}
.focus-card .task-name{font-size:13px;font-weight:600;margin-bottom:2px}
.focus-card .task-sub{font-size:11.5px;color:var(--color-text-faint);margin-bottom:16px}
.focus-ring{width:84px;height:84px;border-radius:var(--radius-full);background:conic-gradient(var(--color-notification) 0turn .38turn, var(--color-surface-offset) .38turn 1turn);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;position:relative}
.focus-ring::before{content:'';position:absolute;inset:8px;border-radius:var(--radius-full);background:var(--color-surface)}
.focus-ring .play-btn{position:relative;width:38px;height:38px;border-radius:var(--radius-full);background:var(--color-notification);display:flex;align-items:center;justify-content:center;color:#fff}
.focus-meta{display:flex;justify-content:space-around;border-top:1px solid var(--color-divider);padding-top:14px}
.focus-meta div{text-align:center}
.focus-meta .v{font-size:14px;font-weight:700;font-family:var(--font-display)}
.focus-meta .l{font-size:10.5px;color:var(--color-text-faint);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.task-row{display:flex;align-items:center;gap:12px;padding:10px 18px;transition:background var(--transition-interactive)}
.task-row:hover{background:var(--color-surface-offset)}
.task-row.playing{background:var(--color-notification-highlight)}
.play-mini{width:28px;height:28px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--color-surface-offset);color:var(--color-text-muted)}
.task-row.playing .play-mini{background:var(--color-notification);color:#fff}
.task-row .info{flex:1;min-width:0}
.task-row .t{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-row .s{font-size:11px;color:var(--color-primary)}
.star{width:15px;height:15px;color:var(--color-text-faint);flex-shrink:0}
.meeting-slot{display:grid;grid-template-columns:52px 1fr;gap:10px;padding:10px 18px}
.meeting-slot .time{font-size:11px;color:var(--color-text-faint);line-height:1.3;padding-top:2px}
.meeting-slot .time b{display:block;font-size:13px;color:var(--color-text);font-weight:700}
.meeting-card{background:var(--color-surface-offset);border-radius:var(--radius-md);padding:9px 12px;font-size:12px}
.meeting-card.highlight{background:var(--color-primary-highlight);border:1px solid color-mix(in oklch, var(--color-primary) 35%, transparent)}
.meeting-card .m-title{font-weight:600;margin-bottom:2px}
.meeting-card .m-sub{color:var(--color-text-faint);font-size:11px}
.schedule-cta{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--color-surface-offset);border:1px dashed var(--color-border);border-radius:var(--radius-md);color:var(--color-primary);font-size:11.5px;font-weight:600;padding:9px 12px}

/* KPI cards for other pages */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
.kpi-card{background:var(--color-surface);border:1px solid var(--color-divider);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow-sm);transition:box-shadow var(--transition-interactive),transform var(--transition-interactive)}
.kpi-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.kpi-label{font-size:12px;color:var(--color-text-muted);font-weight:600;margin-bottom:10px}
.kpi-value{font-family:var(--font-display);font-size:26px;font-weight:700;letter-spacing:-.01em}
.kpi-delta{font-size:12px;font-weight:600;margin-top:6px}
.kpi-delta.up{color:var(--color-success)}
.kpi-delta.down{color:var(--color-notification)}

/* ===== WEEKLY GRID (dashboard centerpiece) ===== */
.week-panel{margin-bottom:18px}
.week-toolbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--color-divider)}
.week-toolbar h2{font-family:var(--font-display);font-size:16px;font-weight:700}
.week-range-nav{display:flex;align-items:center;gap:10px}
.week-range-nav button{width:28px;height:28px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:background var(--transition-interactive)}
.week-range-nav button:hover{background:var(--color-surface-offset)}
.range-toggle{display:flex;gap:2px;background:var(--color-surface-offset);border-radius:var(--radius-md);padding:3px}
.range-toggle button{padding:6px 12px;font-size:12px;font-weight:600;border-radius:var(--radius-sm);color:var(--color-text-muted)}
.range-toggle button.active{background:var(--color-surface-dynamic);color:var(--color-text)}
.week-grid-scroll{overflow-x:auto}
.week-grid{display:grid;grid-template-columns:52px repeat(5,1fr);min-width:820px;position:relative}
.day-col-head{padding:10px 12px;border-bottom:1px solid var(--color-divider);border-left:1px solid var(--color-divider);font-size:11px;color:var(--color-text-faint)}
.day-col-head b{display:block;font-size:14px;color:var(--color-text);font-weight:700;margin-top:2px}
.day-col-head.today{background:color-mix(in oklch, var(--color-notification) 8%, transparent)}
.day-col-head.today b{color:var(--color-notification)}
.time-gutter{border-bottom:1px solid var(--color-divider)}
.time-cell{height:74px;font-size:10.5px;color:var(--color-text-faint);padding:4px 8px 0 0;text-align:right;border-top:1px solid var(--color-divider)}
.day-col{position:relative;border-left:1px solid var(--color-divider)}
.hour-line{height:74px;border-top:1px solid var(--color-divider)}
.event-block{position:absolute;left:5px;right:5px;border-radius:var(--radius-sm);padding:6px 8px;font-size:11px;overflow:hidden;transition:box-shadow var(--transition-interactive),transform var(--transition-interactive);cursor:pointer}
.event-block:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);z-index:5}
.event-block .e-status{font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;opacity:.9;display:flex;align-items:center;gap:4px;margin-bottom:2px}
.event-block .e-status::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.event-block .e-title{font-weight:600;font-size:11.5px;line-height:1.25}
.event-block .e-sub{font-size:10px;opacity:.75;margin-top:2px}
.ev-done{background:var(--color-surface-offset);color:var(--color-text-faint)}
.ev-medium{background:var(--color-warning-highlight);border:1px solid color-mix(in oklch, var(--color-warning) 45%, transparent);color:var(--color-warning)}
.ev-high{background:var(--color-blue-highlight);border:1px solid color-mix(in oklch, var(--color-blue) 40%, transparent);color:var(--color-blue)}
.ev-low{background:var(--color-success-highlight);border-left:2px solid var(--color-success);color:var(--color-success)}
.ev-blank{background:repeating-linear-gradient(135deg, var(--color-surface-offset) 0 6px, transparent 6px 12px);opacity:.6}
.now-line{position:absolute;left:0;right:0;height:0;z-index:8;pointer-events:none}
.now-line::before{content:'';position:absolute;left:0;right:0;top:0;height:1.5px;background:var(--color-notification);box-shadow:0 0 8px color-mix(in oklch, var(--color-notification) 60%, transparent)}
.now-dot{position:absolute;left:-4px;top:-4.5px;width:9px;height:9px;border-radius:50%;background:var(--color-notification);animation:pulse 2s ease-in-out infinite}
.now-label{position:absolute;left:2px;top:-19px;background:var(--color-notification);color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:var(--radius-sm);white-space:nowrap;font-variant-numeric:tabular-nums}

.dash-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:16px}
.activity-panel{padding:16px}
.activity-panel .big-num{font-family:var(--font-display);font-size:28px;font-weight:700;margin:8px 0 14px}
.activity-panel .delta{font-size:11px;background:var(--color-success-highlight);color:var(--color-success);padding:2px 7px;border-radius:var(--radius-full);font-weight:600}
.bars{display:flex;align-items:flex-end;gap:8px;height:80px}
.bars .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bars .bar{width:100%;border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:var(--color-surface-offset)}
.bars .bar.active{background:var(--color-primary)}
.bars .lbl{font-size:9.5px;color:var(--color-text-faint)}
.bars .val{font-size:9.5px;color:var(--color-text-muted);font-weight:600}
.donut-wrap{display:flex;align-items:center;gap:16px;padding:16px}
.donut{width:80px;height:80px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;background:conic-gradient(var(--color-notification) 0 .18turn, var(--color-success) .18turn .42turn, var(--color-warning) .42turn .66turn, var(--color-blue) .66turn 1turn)}
.donut::before{content:'';position:absolute;inset:13px;border-radius:50%;background:var(--color-surface)}
.donut .center{position:relative;text-align:center}
.donut .center b{font-family:var(--font-display);font-size:16px;font-weight:700;display:block}
.donut .center span{font-size:8.5px;color:var(--color-text-faint)}
.legend-list{flex:1;display:flex;flex-direction:column;gap:7px}
.legend-list .row{display:flex;align-items:center;gap:7px;font-size:11.5px}
.legend-list .sw{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.legend-list .name{flex:1;color:var(--color-text-muted)}
.legend-list .pct{font-weight:600}
.reminder-item{display:flex;gap:12px;padding:10px 18px;align-items:flex-start}
.reminder-item .rt{font-size:12px;font-weight:700;font-family:var(--font-display);min-width:52px}
.reminder-item .rb{flex:1}
.reminder-item .rb .rt2{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.reminder-item .rb .rs{font-size:11px;color:var(--color-text-faint);margin-top:2px}
.sev-dot{width:6px;height:6px;border-radius:50%}
.sev-low{background:var(--color-success)}
.sev-high{background:var(--color-notification)}
.add-reminder{display:flex;align-items:center;justify-content:center;gap:6px;margin:8px 18px 16px;background:var(--color-primary-highlight);color:var(--color-primary-active);border-radius:var(--radius-md);padding:10px;font-size:12.5px;font-weight:600}

.list-row{display:flex;align-items:center;gap:12px;padding:11px 18px;transition:background var(--transition-interactive)}
.list-row:hover{background:var(--color-surface-offset)}
.list-icon{width:32px;height:32px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--color-primary-highlight);color:var(--color-primary-active)}
.list-icon svg{width:16px;height:16px}
.list-main{flex:1;min-width:0}
.list-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-sub{font-size:12px;color:var(--color-text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-meta{font-size:11.5px;color:var(--color-text-faint);flex-shrink:0;white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:var(--radius-full);white-space:nowrap}
.badge-p0{background:var(--color-notification-highlight);color:var(--color-notification)}
.badge-p1{background:var(--color-gold-highlight);color:var(--color-gold)}
.badge-p2{background:var(--color-blue-highlight);color:var(--color-blue)}
.badge-p3{background:var(--color-surface-offset-2);color:var(--color-text-muted)}
.badge-active{background:var(--color-success-highlight);color:var(--color-success)}
.badge-warm{background:var(--color-gold-highlight);color:var(--color-gold)}
.badge-cold{background:var(--color-blue-highlight);color:var(--color-blue)}

.mini-kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px 18px}
.mini-col-head{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-muted);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.mini-col-head .count{background:var(--color-surface-offset-2);border-radius:var(--radius-full);padding:1px 7px;font-size:10.5px}
.mini-card{background:var(--color-surface-offset);border:1px solid var(--color-divider);border-radius:var(--radius-md);padding:10px 12px;margin-bottom:8px;transition:box-shadow var(--transition-interactive),transform var(--transition-interactive)}
.mini-card:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.mini-card .name{font-size:12.5px;font-weight:600;margin-bottom:3px}
.mini-card .amt{font-size:12px;color:var(--color-primary);font-weight:700}

.table-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:8px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:0 12px;height:36px;flex:1;max-width:320px}
.search-box svg{width:15px;height:15px;color:var(--color-text-faint);flex-shrink:0}
.search-box input{background:none;border:none;outline:none;width:100%;font-size:13px}
.filter-chip{display:flex;align-items:center;gap:6px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:0 12px;height:36px;font-size:13px;color:var(--color-text-muted)}
.data-table{background:var(--color-surface);border:1px solid var(--color-divider);border-radius:var(--radius-lg);overflow:hidden}
.data-table table{width:100%}
.data-table th{text-align:left;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-faint);padding:12px 18px;border-bottom:1px solid var(--color-divider);background:var(--color-surface-offset)}
.data-table td{padding:13px 18px;border-bottom:1px solid var(--color-divider);font-size:13px}
.data-table tbody tr{transition:background var(--transition-interactive);cursor:pointer}
.data-table tbody tr:hover{background:var(--color-surface-offset)}
.data-table tbody tr:last-child td{border-bottom:none}
.row-name{display:flex;align-items:center;gap:10px}
.avatar-sm{width:28px;height:28px;border-radius:var(--radius-full);background:var(--color-primary-highlight);color:var(--color-primary-active);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;font-size:12.5px;color:var(--color-text-muted)}

.kanban-scroll{overflow-x:auto;padding-bottom:12px}
.kanban-board{display:grid;grid-auto-flow:column;grid-auto-columns:280px;gap:14px}
.kanban-col{background:var(--color-surface-offset);border-radius:var(--radius-lg);padding:12px;display:flex;flex-direction:column;min-height:200px}
.kanban-col-head{display:flex;align-items:center;justify-content:space-between;padding:4px 6px 12px}
.kanban-col-head .title{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-muted)}
.kanban-col-head .count{font-size:11px;background:var(--color-surface-2);border-radius:var(--radius-full);padding:1px 8px;color:var(--color-text-faint)}
.deal-card{background:var(--color-surface);border:1px solid var(--color-divider);border-radius:var(--radius-md);padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow-sm);cursor:grab;transition:box-shadow var(--transition-interactive),transform var(--transition-interactive)}
.deal-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.deal-card .name{font-size:13px;font-weight:600;margin-bottom:6px}
.deal-card .company{font-size:12px;color:var(--color-text-muted);margin-bottom:10px}
.deal-card .amt-row{display:flex;align-items:center;justify-content:space-between}
.deal-card .amt{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--color-primary)}
.deal-card .prob{font-size:11px;color:var(--color-text-faint)}
.deal-card .owner-row{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--color-divider)}
.deal-card .owner-row .avatar-sm{width:20px;height:20px;font-size:9px}
.deal-card .owner-row .due{margin-left:auto;font-size:11px;color:var(--color-text-faint)}

.timeline{position:relative;padding-left:36px}
.timeline::before{content:'';position:absolute;left:15px;top:6px;bottom:6px;width:1px;background:var(--color-divider)}
.tl-item{position:relative;padding-bottom:22px}
.tl-dot{position:absolute;left:-36px;top:0;width:32px;height:32px;border-radius:var(--radius-full);background:var(--color-primary-highlight);color:var(--color-primary-active);display:flex;align-items:center;justify-content:center;border:3px solid var(--color-bg)}
.tl-dot svg{width:15px;height:15px}
.tl-card{background:var(--color-surface);border:1px solid var(--color-divider);border-radius:var(--radius-md);padding:14px 16px}
.tl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.tl-head .t{font-size:13px;font-weight:600}
.tl-head .d{font-size:11.5px;color:var(--color-text-faint)}
.tl-meta{font-size:12px;color:var(--color-text-muted)}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.namecard{background:var(--color-surface);border:1px solid var(--color-divider);border-radius:var(--radius-lg);overflow:hidden;transition:box-shadow var(--transition-interactive)}
.namecard:hover{box-shadow:var(--shadow-md)}
.namecard-img{height:120px;background:linear-gradient(135deg,var(--color-primary-highlight),var(--color-surface-offset-2));display:flex;align-items:center;justify-content:center;color:var(--color-primary)}
.namecard-body{padding:14px 16px}
.namecard-body .n{font-size:13.5px;font-weight:600}
.namecard-body .t{font-size:12px;color:var(--color-text-muted);margin-bottom:8px}
.namecard-field{display:flex;gap:6px;font-size:12px;color:var(--color-text-muted);margin-bottom:3px}
.namecard-actions{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--color-divider)}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--color-divider);margin-bottom:20px}
.tab{padding:10px 4px;font-size:13px;font-weight:600;color:var(--color-text-muted);position:relative;margin-right:20px;transition:color var(--transition-interactive)}
.tab.active{color:var(--color-primary)}
.tab.active::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--color-primary);border-radius:var(--radius-full)}
.detail-grid{display:grid;grid-template-columns:280px 1fr;gap:20px}
.profile-card{background:var(--color-surface);border:1px solid var(--color-divider);border-radius:var(--radius-lg);padding:24px;text-align:center;align-self:start}
.profile-avatar{width:64px;height:64px;border-radius:var(--radius-full);background:var(--color-primary);color:var(--color-text-inverse);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin:0 auto 14px}
.profile-card h3{font-size:15px;font-weight:700}
.profile-card .role{font-size:12.5px;color:var(--color-text-muted);margin-bottom:16px}
.profile-field{display:flex;align-items:center;gap:10px;text-align:left;padding:9px 0;border-top:1px solid var(--color-divider);font-size:12.5px}
.profile-field svg{width:15px;height:15px;color:var(--color-text-faint);flex-shrink:0}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
.tag{background:var(--color-surface-offset);border-radius:var(--radius-full);padding:3px 10px;font-size:11px;color:var(--color-text-muted)}
.settings-grid{display:grid;grid-template-columns:200px 1fr;gap:32px}
.settings-nav{display:flex;flex-direction:column;gap:2px}
.settings-nav .item{padding:9px 12px;border-radius:var(--radius-md);font-size:13px;font-weight:500;color:var(--color-text-muted)}
.settings-nav .item.active{background:var(--color-primary-highlight);color:var(--color-primary-active);font-weight:600}
.form-row{margin-bottom:16px;max-width:420px}
.form-row label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px}
.form-row input,.form-row select{width:100%;height:38px;padding:0 12px;border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface);font-size:13px}
.form-row input:focus,.form-row select:focus{border-color:var(--color-primary);outline:none}
.empty-state{display:flex;flex-direction:column;align-items:center;text-align:center;padding:64px 24px;color:var(--color-text-muted)}
.empty-state svg{color:var(--color-text-faint);margin-bottom:14px}
.empty-state h3{color:var(--color-text);font-size:15px;font-weight:600;margin-bottom:6px}
.empty-state p{font-size:13px;max-width:38ch;margin-bottom:16px}

.project-budget-bar{height:8px;border-radius:var(--radius-full);background:var(--color-surface-offset);overflow:hidden}
.project-budget-fill{height:100%;border-radius:var(--radius-full);transition:width var(--transition-interactive)}
.project-budget-fill.safe{background:var(--color-success)}
.project-budget-fill.warn{background:var(--color-warning)}
.project-budget-fill.danger{background:var(--color-notification)}
.two-col-layout{display:grid;grid-template-columns:1fr 380px;gap:16px}
.side-field{padding:14px 16px;border-top:1px solid var(--color-divider)}
.side-field:first-child{border-top:none}
.side-field .fl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-faint);margin-bottom:8px}
.side-card{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--color-surface-offset);border-radius:var(--radius-md);cursor:pointer;transition:background var(--transition-interactive)}
.side-card:hover{background:var(--color-surface-offset-2)}
.side-card .n{font-size:12.5px;font-weight:600}
.side-card .s{font-size:11px;color:var(--color-text-faint)}
.checklist-row{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--color-divider)}
.checklist-row:last-of-type{border-bottom:none}
.checkbox-circle{width:18px;height:18px;border-radius:50%;border:1.6px solid var(--color-border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background var(--transition-interactive),border-color var(--transition-interactive)}
.checkbox-circle.checked{background:var(--color-success);border-color:var(--color-success)}
.checkbox-circle.checked::after{content:'';width:7px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(0,-1px)}
.checklist-row .ct{flex:1;font-size:12.5px}
.checklist-row.done .ct{color:var(--color-text-faint);text-decoration:line-through}
.checklist-row .cd{font-size:11px;color:var(--color-text-faint)}
.add-checklist{display:flex;align-items:center;gap:6px;padding:9px 4px;color:var(--color-primary);font-size:12.5px;font-weight:600}
.desc-block{padding:16px 18px;font-size:13px;color:var(--color-text-muted);line-height:1.7}
.mini-progress{display:flex;align-items:center;gap:8px}
.mini-progress .bar-bg{flex:1;height:6px;border-radius:var(--radius-full);background:var(--color-surface-offset);overflow:hidden}
.mini-progress .bar-fill{height:100%;border-radius:var(--radius-full)}
.heatmap-row{display:flex;align-items:center;gap:14px;padding:16px 18px}
.heatmap-day{flex:1;text-align:center}
.heatmap-day .bar-bg{height:60px;border-radius:var(--radius-sm);background:var(--color-surface-offset);display:flex;align-items:flex-end;overflow:hidden;margin-bottom:6px}
.heatmap-day .bar-fill{width:100%;background:var(--color-primary);border-radius:var(--radius-sm)}
.heatmap-day .lbl{font-size:10.5px;color:var(--color-text-faint)}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--color-divider);font-size:12.5px}
.stat-row:last-child{border-bottom:none}
.stat-row .l{color:var(--color-text-muted)}
.stat-row .v{font-weight:700;font-family:var(--font-display)}
.rank-num{width:22px;height:22px;border-radius:50%;background:var(--color-surface-offset);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--color-text-muted);flex-shrink:0}
.rank-num.gold{background:var(--color-gold-highlight);color:var(--color-gold)}
@media (max-width:1200px){ .kpi-grid{grid-template-columns:repeat(2,1fr)} .top-row{grid-template-columns:1fr 1fr} .dash-grid{grid-template-columns:1fr} .detail-grid{grid-template-columns:1fr} .settings-grid{grid-template-columns:1fr} }
@media (max-width:900px){
  .app-shell{grid-template-columns:0 1fr}
  .sidebar{position:fixed;inset:0 auto 0 0;width:var(--sidebar-w);z-index:40;transform:translateX(-100%);transition:transform var(--transition-interactive);box-shadow:var(--shadow-lg)}
  .app-shell.mobile-open .sidebar{transform:translateX(0)}
  .app-shell.collapsed{grid-template-columns:0 1fr}
  .main-content{padding:20px 16px 40px}
  .topbar-search{display:none}
  .scrim{position:fixed;inset:0;background:oklch(0 0 0/.3);z-index:30;opacity:0;pointer-events:none;transition:opacity var(--transition-interactive)}
  .app-shell.mobile-open .scrim{opacity:1;pointer-events:auto}
  .top-row{grid-template-columns:1fr}
  .kanban-board{grid-auto-columns:240px}
  .mini-kanban{grid-template-columns:1fr;gap:14px}
  .week-grid{min-width:680px}
}
</style>
</head>

function buildWeekGrid(){
  const grid = document.getElementById('weekGrid');
  if(!grid) return;
  let html = `<div class="time-gutter"></div>`;
  wdays.forEach((d,i)=>{ const isToday = i===2; html += `<div class="day-col-head ${isToday?'today':''}">${d} ${wdates[i]}${isToday?' <span style="color:var(--color-notification);font-size:10px">•today</span>':''}</div>`; });
  html += `<div class="time-gutter">`;
  for(let h=START_HOUR; h<=END_HOUR; h++){ html += `<div class="time-cell">${h>12?h-12:h}:00${h>=12?'pm':'am'}</div>`; }
  html += `</div>`;
  wdays.forEach((d,i)=>{
    html += `<div class="day-col" data-day="${i}" style="height:${(END_HOUR-START_HOUR+1)*HOUR_H}px">`;
    for(let h=START_HOUR; h<=END_HOUR; h++){ html += `<div class="hour-line"></div>`; }
    (weekEvents[i]||[]).forEach(ev=>{
      const top = (ev.start-START_HOUR)*HOUR_H;
      const height = (ev.end-ev.start)*HOUR_H - 4;
      html += `<div class="event-block ${ev.cls}" style="top:${top}px;height:${height}px">${ev.status?`<div class="e-status">${ev.status}</div>`:''}${ev.title?`<div class="e-title">${ev.title}</div>`:''}${ev.sub?`<div class="e-sub">${ev.sub}</div>`:''}</div>`;
    });
    html += `</div>`;
  });
  grid.innerHTML = html;
  placeNowLine();
}
function placeNowLine(){
  document.querySelectorAll('.now-line').forEach(n=>n.remove());
  const now = new Date();
  const hourFloat = now.getHours() + now.getMinutes()/60;
  if (hourFloat < START_HOUR || hourFloat > END_HOUR) return;
  const top = (hourFloat - START_HOUR) * HOUR_H;
  const todayCol = document.querySelector('.day-col[data-day="2"]');
  if(!todayCol) return;
  const line = document.createElement('div');
  line.className = 'now-line';
  line.style.top = top + 'px';
  const hh = now.getHours().toString().padStart(2,'0');
  const mm = now.getMinutes().toString().padStart(2,'0');
  line.innerHTML = `<div class="now-dot"></div><div class="now-label">${hh}:${mm}</div>`;
  todayCol.appendChild(line);
}

        </div>

    </div>
    <div class="panel animate-in" style="margin-top:16px"><div class="panel-head"><h3>Team Activity — This Week</h3></div>

/* ===== ROUTER ===== */
const main = document.getElementById('mainContent');
function render(){
  const hash = location.hash.replace('#','') || 'dashboard';
  const [route, id] = hash.split('/');
  const fn = pages[route] || pages.dashboard;
  main.innerHTML = fn(id);
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.route===route));
  main.scrollTop = 0;
  main.querySelectorAll('[data-nav]').forEach(el=>{ el.addEventListener('click',()=>{ location.hash = el.dataset.nav + (el.dataset.id?('/'+el.dataset.id):''); }); });
  if(nowLineInterval){ clearInterval(nowLineInterval); nowLineInterval=null; }
  if(route==='dashboard'){ buildWeekGrid(); nowLineInterval = setInterval(placeNowLine, 60000); }
}
window.addEventListener('hashchange', render);
render();

/* ===== SHELL BEHAVIOR ===== */
(function(){
  const shell = document.getElementById('appShell');
  const toggle = document.getElementById('sidebarToggle');
  const scrim = document.getElementById('scrim');
  const isMobile = () => window.innerWidth <= 900;
  toggle.addEventListener('click', () => { isMobile() ? shell.classList.toggle('mobile-open') : shell.classList.toggle('collapsed'); });
  scrim.addEventListener('click', () => shell.classList.remove('mobile-open'));

  const themeBtn = document.getElementById('themeToggle');
  const root = document.documentElement;
  let theme = 'light';
  root.setAttribute('data-theme', theme);
  function renderIcon(){
    themeBtn.setAttribute('aria-label', 'Switch to ' + (theme==='dark'?'light':'dark') + ' mode');
    themeBtn.innerHTML = theme==='dark'
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
  renderIcon();
  themeBtn.addEventListener('click', () => { theme = theme==='dark'?'light':'dark'; root.setAttribute('data-theme', theme); renderIcon(); });
  document.querySelectorAll('.nav-item').forEach(item => item.addEventListener('click', () => { if (isMobile()) shell.classList.remove('mobile-open'); }));
})();
</script>
